name: "CodeQL"

on:
  push:
    branches:
      - "main"
      - 'release/**'
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.png'
      - '**/*.yml'
  pull_request:
    branches:
      - "main"
      - 'release/**'
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/*.png'
      - '**/*.yml'
  schedule:
    - cron: '16 20 * * 1'

jobs:
  check-runner:
    name: Check Runner
    uses: ./.github/workflows/check-runner.yml
    secrets: inherit

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: check-runner
    runs-on: ${{ fromJSON(needs.check-runner.outputs.runner || '["ubuntu-latest"]') }}
    defaults:
      run:
        shell: bash
    permissions:
      security-events: write
      packages: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Gradle Environment
        uses: zannagh/versionizer/setup-gradle-env@v1
        with:
          java-distribution: 'microsoft'

      - name: Cache NeoForge NFRT Artifacts
        uses: actions/cache@v4
        with:
          path: neoforge/versions/*/build/moddev/artifacts/
          key: nfrt-${{ runner.os }}-${{ hashFiles('neoforge/versions/*/gradle.properties') }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build
        run: ./gradlew build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
