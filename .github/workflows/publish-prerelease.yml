name: Publish Latest Prerelease

# Periodically checks if the most recent GitHub release is a prerelease.
# If so, publishes it to Modrinth and CurseForge so users get more frequent
# updates even between full releases.

on:
  schedule:
    # Every Monday and Friday at 12:00 UTC
    - cron: '0 12 * * 1,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run full pipeline without actually publishing'
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-prerelease
  cancel-in-progress: true

env:
  MODRINTH_PROJECT_ID: 'zannaghs-armor-hider'
  CURSEFORGE_PROJECT_ID: '1475841'
  PUBLISH_TO_MODRINTH: 'true'
  PUBLISH_TO_CURSEFORGE: 'true'

jobs:
  check-runner:
    name: Check Runner
    uses: ./.github/workflows/check-runner.yml
    secrets: inherit

  find-prerelease:
    name: Find Latest Prerelease
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      tag_name: ${{ steps.check.outputs.tag_name }}
      mod_version: ${{ steps.check.outputs.mod_version }}
      release_body: ${{ steps.check.outputs.release_body }}
    steps:
      - name: Find latest release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the most recent non-draft release (including prereleases)
          LATEST=$(gh api repos/${{ github.repository }}/releases?per_page=10 --jq 'map(select(.draft | not))[0]')

          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "No releases found"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          IS_PRERELEASE=$(echo "$LATEST" | jq -r '.prerelease')
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          BODY=$(echo "$LATEST" | jq -r '.body // ""')

          echo "Latest release: $TAG (prerelease=$IS_PRERELEASE)"

          if [[ "$IS_PRERELEASE" != "true" ]]; then
            echo "Latest release is not a prerelease — nothing to do"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Strip leading 'v' to get mod version
          MOD_VERSION="${TAG#v}"

          echo "should_publish=true" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
          echo "mod_version=$MOD_VERSION" >> $GITHUB_OUTPUT

          # Store release body for changelog (multi-line safe)
          {
            echo "release_body<<RELEASE_BODY_EOF"
            echo "$BODY"
            echo "RELEASE_BODY_EOF"
          } >> $GITHUB_OUTPUT

  check-modrinth:
    name: Check Modrinth Versions
    runs-on: ubuntu-latest
    needs: find-prerelease
    if: needs.find-prerelease.outputs.should_publish == 'true'
    outputs:
      version_exists: ${{ steps.modrinth-check.outputs.version_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Modrinth Version
        id: modrinth-check
        uses: ./.github/actions/check-modrinth-version
        with:
          project-id: ${{ env.MODRINTH_PROJECT_ID }}
          mod-version: ${{ needs.find-prerelease.outputs.mod_version }}
          fail-on-regression: 'true'

  build:
    name: Build
    runs-on: ${{ fromJSON(needs.check-runner.outputs.runner || '["ubuntu-latest"]') }}
    needs: [find-prerelease, check-modrinth, check-runner]
    if: |
      needs.find-prerelease.outputs.should_publish == 'true' &&
      needs.check-modrinth.outputs.version_exists != 'true'
    defaults:
      run:
        shell: bash
    outputs:
      mod_version: ${{ needs.find-prerelease.outputs.mod_version }}
      supported_versions: ${{ steps.versions.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-prerelease.outputs.tag_name }}
          fetch-depth: 0

      - name: Setup Gradle Environment
        uses: zannagh/versionizer/setup-gradle-env@v1

      - name: Build & Stage Artifacts
        run: |
          ./gradlew stageArtifacts \
            -PsemVer="${{ needs.find-prerelease.outputs.mod_version }}" \
            -Pprerelease="true"

      - name: Read Supported Versions
        id: versions
        run: |
          MATRIX=$(jq -c '[
            (.fabric // {} | keys[] | {minecraft: ., loader: "fabric"}),
            (.neoforge // {} | keys[] | {minecraft: ., loader: "neoforge"})
          ]' staging/versions.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: armor-hider-${{ needs.find-prerelease.outputs.mod_version }}
          path: |
            staging/*.jar
            staging/versions.json
          if-no-files-found: error

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [find-prerelease, build]
    outputs:
      user-facing: ${{ steps.user-changelog.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-prerelease.outputs.tag_name }}
          fetch-depth: 0

      - name: Generate User-Facing Changelog
        id: user-changelog
        uses: ./.github/actions/generate-user-changelog
        with:
          is-manual-release: 'false'
          release-body: ${{ needs.find-prerelease.outputs.release_body }}
          mod-version: ${{ needs.find-prerelease.outputs.mod_version }}
          repository: ${{ github.repository }}

  # ============================================================================
  # PUBLISH TO MODRINTH
  # ============================================================================
  publish-modrinth:
    name: Publish to Modrinth
    runs-on: ubuntu-latest
    needs: [find-prerelease, check-modrinth, build, changelog]
    if: needs.check-modrinth.outputs.version_exists != 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build.outputs.supported_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          name: armor-hider-${{ needs.find-prerelease.outputs.mod_version }}
          path: artifacts

      - name: Get game versions
        id: game-versions
        run: |
          VERSIONS=$(jq -r '."${{ matrix.loader }}"."${{ matrix.minecraft }}" // ["${{ matrix.minecraft }}"] | .[]' artifacts/versions.json)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare Upload
        id: modrinth
        uses: ./.github/actions/prepare-modrinth-upload
        with:
          display-version: ${{ matrix.minecraft }}
          mod-version: ${{ needs.find-prerelease.outputs.mod_version }}
          is-prerelease: 'true'
          artifact-path: artifacts
          loader: ${{ matrix.loader }}

      - name: Preview Modrinth Upload
        if: steps.modrinth.outputs.found == 'true'
        run: |
          echo "=========================================="
          echo "MODRINTH UPLOAD PREVIEW (Scheduled Prerelease)"
          echo "=========================================="
          echo ""
          echo "File: ${{ steps.modrinth.outputs.jar_path }}"
          echo "  Version:       ${{ steps.modrinth.outputs.version_number }}"
          echo "  Display Name:  ${{ steps.modrinth.outputs.version_name }}"
          echo "  Version Type:  ${{ steps.modrinth.outputs.version_type }}"
          echo "  Game Versions: ${{ matrix.minecraft }}"
          echo "  Loader:        ${{ matrix.loader }}${{ matrix.loader == 'fabric' && ', quilt' || '' }}"
          echo "=========================================="

      - name: Publish to Modrinth
        if: ${{ steps.modrinth.outputs.found == 'true' && env.PUBLISH_TO_MODRINTH == 'true' && !inputs.dry_run }}
        uses: Kira-NT/mc-publish@v3.3
        with:
          modrinth-id: ${{ env.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ${{ steps.modrinth.outputs.jar_path }}
          name: ${{ steps.modrinth.outputs.version_name }}
          version: ${{ steps.modrinth.outputs.version_number }}
          version-type: ${{ steps.modrinth.outputs.version_type }}
          loaders: |
            ${{ matrix.loader }}
            ${{ matrix.loader == 'fabric' && 'quilt' || '' }}
          game-versions: |
            ${{ steps.game-versions.outputs.list }}
          game-version-filter: any
          changelog: ${{ needs.changelog.outputs.user-facing }}
          modrinth-featured: false
          retry-attempts: 2
          retry-delay: 10000

  # ============================================================================
  # PUBLISH TO CURSEFORGE
  # ============================================================================
  publish-curseforge:
    name: Publish to CurseForge
    runs-on: ubuntu-latest
    needs: [find-prerelease, build, changelog]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build.outputs.supported_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          name: armor-hider-${{ needs.find-prerelease.outputs.mod_version }}
          path: artifacts

      - name: Get game versions
        id: game-versions
        run: |
          VERSIONS=$(jq -r '."${{ matrix.loader }}"."${{ matrix.minecraft }}" // ["${{ matrix.minecraft }}"] | .[]' artifacts/versions.json)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$VERSIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare Upload
        id: curseforge
        uses: ./.github/actions/prepare-modrinth-upload
        with:
          display-version: ${{ matrix.minecraft }}
          mod-version: ${{ needs.find-prerelease.outputs.mod_version }}
          is-prerelease: 'true'
          artifact-path: artifacts
          loader: ${{ matrix.loader }}

      - name: Preview CurseForge Upload
        if: steps.curseforge.outputs.found == 'true'
        run: |
          echo "=========================================="
          echo "CURSEFORGE UPLOAD PREVIEW (Scheduled Prerelease)"
          echo "=========================================="
          echo ""
          echo "File: ${{ steps.curseforge.outputs.jar_path }}"
          echo "  Version:       ${{ steps.curseforge.outputs.version_number }}"
          echo "  Display Name:  ${{ steps.curseforge.outputs.version_name }}"
          echo "  Version Type:  ${{ steps.curseforge.outputs.version_type }}"
          echo "  Game Versions: ${{ matrix.minecraft }}"
          echo "  Loader:        ${{ matrix.loader }}${{ matrix.loader == 'fabric' && ', quilt' || '' }}"
          echo "=========================================="

      - name: Publish to CurseForge
        if: ${{ steps.curseforge.outputs.found == 'true' && env.PUBLISH_TO_CURSEFORGE == 'true' && !inputs.dry_run }}
        uses: Kira-NT/mc-publish@v3.3
        with:
          curseforge-id: ${{ env.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: ${{ steps.curseforge.outputs.jar_path }}
          name: ${{ steps.curseforge.outputs.version_name }}
          version: ${{ steps.curseforge.outputs.version_number }}
          version-type: ${{ steps.curseforge.outputs.version_type }}
          loaders: |
            ${{ matrix.loader }}
            ${{ matrix.loader == 'fabric' && 'quilt' || '' }}
          game-versions: |
            ${{ steps.game-versions.outputs.list }}
          game-version-filter: any
          changelog: ${{ needs.changelog.outputs.user-facing }}
          retry-attempts: 2
          retry-delay: 10000

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [find-prerelease, check-modrinth, build, publish-modrinth, publish-curseforge]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          {
            echo "## Scheduled Prerelease Publish"
            echo ""

            SHOULD_PUBLISH="${{ needs.find-prerelease.outputs.should_publish }}"
            TAG="${{ needs.find-prerelease.outputs.tag_name }}"
            VERSION="${{ needs.find-prerelease.outputs.mod_version }}"
            VERSION_EXISTS="${{ needs.check-modrinth.outputs.version_exists }}"

            if [[ "$SHOULD_PUBLISH" != "true" ]]; then
              echo "**No prerelease to publish.** The latest GitHub release is a full release."
            elif [[ "$VERSION_EXISTS" == "true" ]]; then
              echo "**Skipped.** Prerelease \`$TAG\` ($VERSION) already exists on Modrinth."
            else
              echo "| Detail | Value |"
              echo "| ------ | ----- |"
              echo "| Prerelease | \`$TAG\` |"
              echo "| Mod Version | \`$VERSION\` |"
              echo "| Build | ${{ needs.build.result }} |"
              echo "| Modrinth | ${{ needs.publish-modrinth.result }} |"
              echo "| CurseForge | ${{ needs.publish-curseforge.result }} |"
              if [[ "${{ inputs.dry_run }}" == "true" ]]; then
                echo ""
                echo "**Dry run — nothing was actually published.**"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
