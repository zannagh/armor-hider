# Reusable workflow to check self-hosted runner availability.
# Prefers the Linux runner 'armor-hider-ubuntu', then the Windows runner
# 'armor-hider-runner', and falls back to ubuntu-latest if neither is online,
# or if RUNNER_TOKEN is not configured (e.g., in forks).

name: Check Runner

on:
  workflow_call:
    outputs:
      runner:
        description: 'JSON label array for runs-on (e.g., ["self-hosted","Linux","X64"], ["self-hosted","Windows","X64"], or ["ubuntu-latest"])'
        value: ${{ jobs.check-runner.outputs.runner }}

jobs:
  check-runner:
    name: Check Runner
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check self-hosted runner availability
        id: check
        # RUNNER_TOKEN requires a fine-grained PAT with Administration:read
        # scoped to this repository. Falls back gracefully if not set.
        env:
          GH_TOKEN: ${{ secrets.RUNNER_TOKEN }}
        run: |
          RUNNER='["ubuntu-latest"]'
          # Fetch all runners once, then pick by priority: Linux, then Windows.
          if RUNNERS=$(gh api "repos/${{ github.repository }}/actions/runners"); then
            UBUNTU_STATUS=$(echo "$RUNNERS" | jq -r '.runners[] | select(.name == "armor-hider-ubuntu") | .status')
            WINDOWS_STATUS=$(echo "$RUNNERS" | jq -r '.runners[] | select(.name == "armor-hider-runner") | .status')
            if [ "$UBUNTU_STATUS" = "online" ]; then
              RUNNER='["self-hosted","Linux","X64"]'
              echo "Self-hosted runner 'armor-hider-ubuntu' is online."
            elif [ "$WINDOWS_STATUS" = "online" ]; then
              RUNNER='["self-hosted","Windows","X64"]'
              echo "Self-hosted runner 'armor-hider-runner' is online."
            else
              echo "::warning::No self-hosted runner online (armor-hider-ubuntu='${UBUNTU_STATUS:-not found}', armor-hider-runner='${WINDOWS_STATUS:-not found}'). Falling back to ubuntu-latest."
            fi
          else
            echo "::warning::Failed to query runner status via gh api. Falling back to ubuntu-latest."
          fi
          echo "Using runner: $RUNNER"
          echo "runner=$RUNNER" >> $GITHUB_OUTPUT
